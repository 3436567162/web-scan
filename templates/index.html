<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Vulnerability Scanner</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>Web Vulnerability Scanner</h1>
            <p class="subtitle">Enter a target URL to run the baseline OWASP-style checks.</p>
        </header>

        <div class="scan-box">
            <div class="input-group">
                <input type="text" id="targetUrl" placeholder="Enter a target URL, for example: http://example.com" />
                <button id="scanBtn" onclick="startScan()">Start Scan</button>
            </div>
            <div class="module-picker">
                <p class="module-picker-label">Scan modules</p>
                <div class="module-grid">
                    {% for module in scan_modules %}
                    <label class="module-option">
                        <input type="checkbox" name="scanModule" value="{{ module.id }}" checked />
                        <span>{{ module.label }}</span>
                    </label>
                    {% endfor %}
                </div>
            </div>
            <p class="disclaimer">Use only for authorized security testing.</p>
        </div>

        <div id="progress" class="progress hidden">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <p id="progressText">Scanning...</p>
        </div>

        <div id="summary" class="summary hidden">
            <h2>Scan Summary</h2>
            <div class="summary-cards">
                <div class="card card-high">
                    <span class="card-count" id="countHigh">0</span>
                    <span class="card-label">High</span>
                </div>
                <div class="card card-medium">
                    <span class="card-count" id="countMedium">0</span>
                    <span class="card-label">Medium</span>
                </div>
                <div class="card card-low">
                    <span class="card-count" id="countLow">0</span>
                    <span class="card-label">Low</span>
                </div>
                <div class="card card-pass">
                    <span class="card-count" id="countPass">0</span>
                    <span class="card-label">Pass</span>
                </div>
            </div>
        </div>

        <div id="results" class="results hidden">
            <h2>Detailed Results</h2>
            <div id="resultsContainer"></div>
        </div>
    </div>

    <script>
        const SCAN_MODULES = {{ scan_modules|tojson }};
        const SCAN_MODULE_LABELS = Object.fromEntries(
            SCAN_MODULES.map(module => [module.id, module.label])
        );

        function getSelectedModules() {
            return Array.from(document.querySelectorAll('input[name="scanModule"]:checked'))
                .map(input => input.value);
        }

        function getModuleLabel(moduleId) {
            return SCAN_MODULE_LABELS[moduleId] || moduleId;
        }

        async function startScan() {
            const url = document.getElementById("targetUrl").value.trim();
            if (!url) {
                alert("Please enter a target URL.");
                return;
            }
            const selectedModules = getSelectedModules();
            if (selectedModules.length === 0) {
                alert("Select at least one scan module.");
                return;
            }

            const btn = document.getElementById("scanBtn");
            btn.disabled = true;
            btn.textContent = "Scanning...";

            document.getElementById("progress").classList.remove("hidden");
            document.getElementById("summary").classList.add("hidden");
            document.getElementById("results").classList.add("hidden");
            document.getElementById("resultsContainer").innerHTML = "";

            let progress = 0;
            const progressFill = document.getElementById("progressFill");
            const progressText = document.getElementById("progressText");
            const progressModules = selectedModules.map(getModuleLabel);
            const interval = setInterval(() => {
                progress = Math.min(progress + Math.random() * 8, 90);
                progressFill.style.width = progress + "%";
                const moduleIdx = Math.min(
                    Math.floor((progress / 100) * progressModules.length),
                    progressModules.length - 1
                );
                progressText.textContent = `Scanning: ${progressModules[moduleIdx]}...`;
            }, 300);

            try {
                const resp = await fetch("/api/scan", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({url: url, modules: selectedModules}),
                });
                const data = await resp.json();

                clearInterval(interval);
                progressFill.style.width = "100%";
                progressText.textContent = "Scan complete.";

                if (data.error) {
                    alert(data.error);
                    return;
                }

                displayResults(data);
            } catch (e) {
                clearInterval(interval);
                progressText.textContent = "Scan failed: " + e.message;
            } finally {
                btn.disabled = false;
                btn.textContent = "Start Scan";
            }
        }

        function displayResults(data) {
            const summary = data.summary || {};
            let passCount = 0;

            for (const [module, items] of Object.entries(data.results || {})) {
                for (const item of items) {
                    if (item.type === "pass") {
                        passCount++;
                    }
                }
            }

            document.getElementById("countHigh").textContent = summary.high || 0;
            document.getElementById("countMedium").textContent = summary.medium || 0;
            document.getElementById("countLow").textContent = summary.low || 0;
            document.getElementById("countPass").textContent = passCount;
            document.getElementById("summary").classList.remove("hidden");

            const container = document.getElementById("resultsContainer");
            container.innerHTML = "";

            const metadataSummary = formatScanMetadata(data.scan_metadata);
            if (metadataSummary) {
                const metadataDiv = document.createElement("div");
                metadataDiv.className = "scan-metadata";
                metadataDiv.textContent = metadataSummary;
                container.appendChild(metadataDiv);
            }

            for (const [module, items] of Object.entries(data.results || {})) {
                const section = document.createElement("div");
                section.className = "result-section";

                const header = document.createElement("div");
                header.className = "section-header";
                header.onclick = () => section.classList.toggle("collapsed");

                const vulnCount = items.filter(i => ["high", "medium", "low"].includes(i.severity || i.type)).length;
                const badge = vulnCount > 0
                    ? `<span class="badge badge-warn">${vulnCount} issues</span>`
                    : `<span class="badge badge-ok">Pass</span>`;

                header.innerHTML = `<h3>${escapeHtml(getModuleLabel(module))}</h3>${badge}`;
                section.appendChild(header);

                const body = document.createElement("div");
                body.className = "section-body";

                for (const item of items) {
                    const itemDiv = document.createElement("div");
                    itemDiv.className = "result-item result-" + (item.type || "info");

                    const severityMap = {
                        high: "High",
                        medium: "Medium",
                        low: "Low",
                        pass: "Pass",
                        info: "Info",
                        error: "Error"
                    };

                    const confidencePill = item.confidence !== undefined && item.confidence !== null && item.confidence !== ""
                        ? `<span class="meta-pill">Confidence: ${escapeHtml(String(item.confidence))}</span>`
                        : "";
                    const statusPill = item.status
                        ? `<span class="meta-pill">Status: ${escapeHtml(String(item.status))}</span>`
                        : "";
                    const metadataRow = confidencePill || statusPill
                        ? `<div class="result-meta">${confidencePill}${statusPill}</div>`
                        : "";
                    const evidenceBlock = renderListBlock("Evidence", item.evidence, "evidence-list");
                    const remediationBlock = renderListBlock("Remediation", item.remediation, "remediation-list");
                    const severityLabel = escapeHtml(String(severityMap[item.type] || item.type || "Info"));

                    itemDiv.innerHTML = `
                        <div class="result-header">
                            <span class="severity severity-${escapeHtml(item.type || "info")}">${severityLabel}</span>
                            <span class="result-title">${escapeHtml(item.title || "Untitled finding")}</span>
                        </div>
                        <pre class="result-detail">${escapeHtml(item.detail || "")}</pre>
                        ${metadataRow}
                        ${evidenceBlock}
                        ${remediationBlock}
                    `;
                    body.appendChild(itemDiv);
                }

                section.appendChild(body);
                container.appendChild(section);
            }

            document.getElementById("results").classList.remove("hidden");

            document.querySelectorAll(".result-section").forEach(sec => {
                const badge = sec.querySelector(".badge-ok");
                if (badge) {
                    sec.classList.add("collapsed");
                }
            });
        }

        function escapeHtml(text) {
            const div = document.createElement("div");
            div.textContent = text;
            return div.innerHTML;
        }

        function renderListBlock(label, items, className) {
            if (!Array.isArray(items) || items.length === 0) {
                return "";
            }

            const rows = items
                .map(formatOptionalItem)
                .filter(Boolean)
                .map(item => `<li>${escapeHtml(item)}</li>`)
                .join("");

            if (!rows) {
                return "";
            }

            return `
                <div class="result-list-block">
                    <div class="result-list-label">${escapeHtml(label)}</div>
                    <ul class="${className}">${rows}</ul>
                </div>
            `;
        }

        function formatOptionalItem(item) {
            if (item === null || item === undefined) {
                return "";
            }
            if (typeof item === "string" || typeof item === "number" || typeof item === "boolean") {
                return String(item);
            }
            if (typeof item === "object") {
                const usefulFields = Object.entries(item)
                    .filter(([, value]) => value !== null && value !== undefined && value !== "")
                    .map(([key, value]) => `${key}: ${value}`);
                if (usefulFields.length > 0) {
                    return usefulFields.join(" | ");
                }
                try {
                    return JSON.stringify(item);
                } catch (_error) {
                    return "";
                }
            }
            return "";
        }

        function formatScanMetadata(scanMetadata) {
            if (!scanMetadata || typeof scanMetadata !== "object") {
                return "";
            }

            const parts = [];
            if (scanMetadata.duration_ms !== undefined && scanMetadata.duration_ms !== null) {
                parts.push(`Duration: ${scanMetadata.duration_ms} ms`);
            }
            if (Array.isArray(scanMetadata.modules_run)) {
                parts.push(`Modules: ${scanMetadata.modules_run.length}`);
            }
            if (Array.isArray(scanMetadata.selected_modules) && scanMetadata.selected_modules.length > 0) {
                parts.push(`Selected: ${scanMetadata.selected_modules.map(getModuleLabel).join(", ")}`);
            }
            if (scanMetadata.request_budget_limit !== undefined && scanMetadata.request_budget_limit !== null) {
                parts.push(`Budget: ${scanMetadata.request_budget_limit}`);
            }
            if (scanMetadata.request_budget_exhausted === true) {
                parts.push("Budget exhausted");
            }
            if (Array.isArray(scanMetadata.modules_skipped) && scanMetadata.modules_skipped.length > 0) {
                parts.push(`Skipped: ${scanMetadata.modules_skipped.map(getModuleLabel).join(", ")}`);
            }

            return parts.join(" | ");
        }

        document.getElementById("targetUrl").addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                startScan();
            }
        });
    </script>
</body>
</html>
